name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: easyflowhub-app

jobs:
  test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Run type check
        run: bunx tsc --noEmit

  scriptmgr-go-test:
    name: Go Tests (scriptmgr-go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scriptmgr-go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test ./...

  scriptmgr-go-lint:
    name: Go Lint (scriptmgr-go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scriptmgr-go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Lint
        run: go vet ./...

  scriptmgr-go-build:
    name: Build (scriptmgr-go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scriptmgr-go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o scriptmgr.exe ./cmd/scriptmgr
