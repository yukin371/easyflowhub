name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-app:
    name: Build EasyFlowHub
    runs-on: windows-latest

    defaults:
      run:
        working-directory: easyflowhub-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Install Tauri CLI
        run: bun add -D @tauri-apps/cli@latest

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easyflowhub-installers
          path: |
            easyflowhub-app/src-tauri/target/release/bundle/nsis/*.exe
            easyflowhub-app/src-tauri/target/release/bundle/msi/*.msi

  build-scriptmgr:
    name: Build scriptmgr-go
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scriptmgr-go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -ldflags="-s -w" -o scriptmgr.exe ./cmd/scriptmgr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptmgr
          path: scriptmgr-go/scriptmgr.exe

  release:
    name: Create Release
    needs: [build-app, build-scriptmgr]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          name: easyflowhub-installers
          path: app

      - name: Download scriptmgr artifact
        uses: actions/download-artifact@v4
        with:
          name: scriptmgr
          path: scriptmgr

      - name: List artifacts
        run: ls -la && ls -la app && ls -la scriptmgr

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/*.exe
            app/*.msi
            scriptmgr/scriptmgr.exe
          generate_release_notes: true
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ASSET=$(ls app/*.exe | head -1 | xargs basename)

          cat << EOF > latest.json
          {
            "version": "$VERSION",
            "date": "$(date +%Y-%m-%d)",
            "body": "See release notes",
            "path": "$ASSET",
            "sha256": "$(sha256sum app/*.exe | cut -d' ' -f1)"
          }
          EOF

          cat latest.json

      - name: Upload latest.json
        run: gh release upload ${{ github.ref_name }} latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
