name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-app:
    name: Build EasyFlowHub
    runs-on: windows-latest

    defaults:
      run:
        working-directory: easyflowhub-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Install Tauri CLI
        run: bun add -D @tauri-apps/cli@latest

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build

      - name: List build output
        shell: pwsh
        run: |
          Write-Host "=== NSIS ===" ; Get-ChildItem src-tauri/target/release/bundle/nsis/ -ErrorAction SilentlyContinue
          Write-Host "=== MSI ===" ; Get-ChildItem src-tauri/target/release/bundle/msi/ -ErrorAction SilentlyContinue
          Write-Host "=== Portable exe ===" ; Get-ChildItem src-tauri/target/release/*.exe -ErrorAction SilentlyContinue

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: easyflowhub-installers
          path: |
            easyflowhub-app/src-tauri/target/release/bundle/nsis/
            easyflowhub-app/src-tauri/target/release/bundle/msi/
            easyflowhub-app/src-tauri/target/release/*.exe

  build-scriptmgr:
    name: Build scriptmgr-go
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scriptmgr-go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scriptmgr-go/go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o scriptmgr.exe ./cmd/scriptmgr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptmgr
          path: scriptmgr-go/scriptmgr.exe

  release:
    name: Create Release
    needs: [build-app, build-scriptmgr]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          name: easyflowhub-installers
          path: app

      - name: Download scriptmgr artifact
        uses: actions/download-artifact@v4
        with:
          name: scriptmgr
          path: scriptmgr

      - name: List artifacts
        run: find app -type f && find scriptmgr -type f

      - name: Organize artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Move NSIS installer to app root
          NSIS=$(find app -path '*/nsis/*.exe' -type f | head -1)
          if [ -n "$NSIS" ]; then
            mv "$NSIS" "app/EasyFlowHub_${VERSION}_x64-setup.exe"
          fi

          # Move MSI to app root
          MSI=$(find app -path '*/msi/*.msi' -type f | head -1)
          if [ -n "$MSI" ]; then
            mv "$MSI" "app/EasyFlowHub_${VERSION}_x64_en-US.msi"
          fi

          # Rename portable exe
          if [ -f "app/easyflowhub.exe" ]; then
            mv app/easyflowhub.exe "app/EasyFlowHub_${VERSION}_portable.exe"
          fi

          echo "=== Final file list ==="
          find app -maxdepth 1 -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/EasyFlowHub_*_x64-setup.exe
            app/EasyFlowHub_*_x64_en-US.msi
            app/EasyFlowHub_*_portable.exe
            scriptmgr/scriptmgr.exe
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Use NSIS installer as update asset
          SETUP_FILE=$(find app -name '*x64-setup.exe' -type f | head -1)
          if [ -z "$SETUP_FILE" ]; then
            echo "No setup .exe found"
            ls -la app/
            exit 1
          fi

          ASSET=$(basename "$SETUP_FILE")
          SHA256=$(sha256sum "$SETUP_FILE" | cut -d' ' -f1)

          cat << EOF > latest.json
          {
            "version": "$VERSION",
            "date": "$(date +%Y-%m-%d)",
            "body": "See release notes",
            "path": "$ASSET",
            "sha256": "$SHA256"
          }
          EOF

          cat latest.json

      - name: Upload latest.json
        run: gh release upload ${{ github.ref_name }} latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
