<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- 背景 -->
  <rect width="128" height="128" rx="28" fill="url(#paint0_linear)"/>

  <!-- 顶部装饰光晕 -->
  <ellipse cx="64" cy="20" rx="50" ry="20" fill="white" fill-opacity="0.15"/>

  <!-- 左侧笔记线条 -->
  <g stroke="white" stroke-width="7" stroke-linecap="round">
    <line x1="22" y1="42" x2="52" y2="42"/>
    <line x1="22" y1="62" x2="68" y2="62"/>
    <line x1="22" y1="82" x2="44" y2="82"/>
  </g>

  <!-- 右侧大括号弧线 -->
  <path d="M82 36 C104 36 112 50 112 64 C112 78 104 92 82 92"
