  <!-- 箭头指示 -->
  <path d="M102 58 L112 64 L102 70" fill="#00F2FE"/>

  <!-- 底部装饰 -->
  <circle cx="30" cy="108" r="3" fill="white" fill-opacity="0.4"/>
  <circle cx="44" cy="108" r="3" fill="white" fill-opacity="0.6"/>
  <circle cx="58" cy="108" r="3" fill="white" fill-opacity="0.8"/>

  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FACFE"/>
      <stop offset="1" stop-color="#00F2FE"/>
    </linearGradient>
  </defs>
</svg>
