<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- 内发光 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg)"/>

  <!-- 笔记/文档页 -->
  <g filter="url(#glow)">
    <!-- 主文档 -->
    <path d="M40 32h48a4 4 0 0 1 4 4v56a4 4 0 0 1-4 4H40a4 4 0 0 1-4-4V36a4 4 0 0 1 4-4z"
          fill="white" fill-opacity="0.95"/>

    <!-- 文档折叠角 -->
    <path d="M76 32v12a4 4 0 0 0 4 4h12"
          stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>

    <!-- 文字行 -->
    <rect x="48" y="48" width="32" height="3" rx="1.5" fill="#3B82F6" fill-opacity="0.6"/>
    <rect x="48" y="56" width="24" height="3" rx="1.5" fill="#3B82F6" fill-opacity="0.4"/>
    <rect x="48" y="64" width="28" height="3" rx="1.5" fill="#3B82F6" fill-opacity="0.4"/>
    <rect x="48" y="72" width="20" height="3" rx="1.5" fill="#3B82F6" fill-opacity="0.3"/>
  </g>

  <!-- 闪电/流动符号 - 代表效率 -->
  <g transform="translate(82, 82)">
    <path d="M4 0 L0 12 L6 12 L2 24 L10 10 L4 10 L8 0 Z"
          fill="white" fill-opacity="0.95" stroke="white" stroke-width="1" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 装饰圆点 -->
  <circle cx="30" cy="98" r="2" fill="white" fill-opacity="0.3"/>
  <circle cx="38" cy="98" r="2" fill="white" fill-opacity="0.5"/>
  <circle cx="46" cy="98" r="2" fill="white" fill-opacity="0.7"/>
</svg>
